<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ page_title|default:"POS Analytics" }}{% endblock %} — Kramer POS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% load static %}
  <link href="{% static 'css/custom.css' %}?v=2" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-expand-lg kramer-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard' %}">
      <img src="{% static 'img/kramer_logo.png' %}" alt="Kramer" height="28">
      <span class="brand-title">POS Analytics</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-4 me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'dashboard' %}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'distributor_list' %}active{% endif %}"
             href="{% url 'distributor_list' %}">
            <i class="bi bi-building me-1"></i>Distributors
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'upload' %}active{% endif %}"
             href="{% url 'upload' %}">
            <i class="bi bi-cloud-upload me-1"></i>Upload Report
          </a>
        </li>
      </ul>
      <span class="navbar-text text-white-50 small">
        <i class="bi bi-diagram-3 me-1"></i>Phase 1 — Local
      </span>
    </div>
  </div>
</nav>

<!-- Messages -->
<div class="container-fluid px-4 pt-3">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show" role="alert">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>

<!-- Main Content -->
<main class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
