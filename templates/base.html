<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <script>(function(){var t=localStorage.getItem('pos-theme');if(t)document.documentElement.setAttribute('data-bs-theme',t);})()</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ page_title|default:"KPos" }}{% endblock %} — KPos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  {% load static %}
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon.svg' %}">
  <link href="{% static 'css/custom.css' %}?v=5" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" rel="stylesheet">
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar navbar-expand-lg kramer-navbar">
  <div class="container-fluid px-4">
    <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'dashboard' %}">
      <span class="brand-title">KPos</span>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-4 me-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
             href="{% url 'dashboard' %}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'distributor_list' %}active{% endif %}"
             href="{% url 'distributor_list' %}">
            <i class="bi bi-building me-1"></i>Distributors
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'salesperson_list' %}active{% endif %}"
             href="{% url 'salesperson_list' %}">
            <i class="bi bi-person-badge me-1"></i>Account Managers
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'product_list' or request.resolver_match.url_name == 'product_detail' %}active{% endif %}"
             href="{% url 'product_list' %}">
            <i class="bi bi-box-seam me-1"></i>Products
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.resolver_match.url_name == 'upload' %}active{% endif %}"
             href="{% url 'upload' %}">
            <i class="bi bi-cloud-upload me-1"></i>Upload Report
          </a>
        </li>
      </ul>
      <div class="d-flex align-items-center gap-3">
        <span class="navbar-text d-none d-lg-inline">
          <i class="bi bi-diagram-3 me-1"></i>Phase 1 — Local
        </span>
        <form method="post" action="{% url 'set_currency' %}" class="d-inline me-2">
          {% csrf_token %}
          <input type="hidden" name="next" value="{{ request.get_full_path }}">
          <div class="btn-group btn-group-sm" role="group">
            <button type="submit" name="currency" value="USD"
              class="btn px-2 py-1"
              style="{% if request.session.currency == 'EUR' %}background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.3);{% else %}background:#fff;color:#8200B4;border:1px solid #fff;font-weight:600;{% endif %}">
              $ USD
            </button>
            <button type="submit" name="currency" value="EUR"
              class="btn px-2 py-1"
              style="{% if request.session.currency == 'EUR' %}background:#fff;color:#8200B4;border:1px solid #fff;font-weight:600;{% else %}background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.3);{% endif %}">
              € EUR
            </button>
          </div>
        </form>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
          <i class="bi bi-sun-fill" id="iconLight" style="display:none"></i>
          <i class="bi bi-moon-fill" id="iconDark"></i>
          <span id="themeLabel" class="d-none d-md-inline" style="font-size:.78rem">Dark</span>
        </button>
      </div>
    </div>
  </div>
</nav>

<!-- Messages -->
<div class="container-fluid px-4 pt-3">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show" role="alert">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>

<!-- Main Content -->
<main class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function() {
  function updateIcon(t) {
    var il = document.getElementById('iconLight');
    var id = document.getElementById('iconDark');
    var lb = document.getElementById('themeLabel');
    if (!il) return;
    if (t === 'dark') {
      il.style.display = 'none'; id.style.display = '';
      if (lb) lb.textContent = 'Dark';
    } else {
      il.style.display = ''; id.style.display = 'none';
      if (lb) lb.textContent = 'Light';
    }
  }
  window.toggleTheme = function() {
    var cur = document.documentElement.getAttribute('data-bs-theme') || 'dark';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-bs-theme', next);
    localStorage.setItem('pos-theme', next);
    updateIcon(next);
    if (window.onThemeChange) window.onThemeChange(next);
  };
  updateIcon(document.documentElement.getAttribute('data-bs-theme') || 'dark');
})();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
