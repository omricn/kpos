          <a class="nav-link {% if request.resolver_match.url_name == 'distributor_list' %}active{% endif %}"

          <input type="hidden" name="next" value="{{ request.get_full_path }}">
          <div class="btn-group btn-group-sm" role="group">
            <button type="submit" name="currency" value="USD" class="btn {% if request.session.currency == 'EUR' %}btn-outline-secondary{% else %}btn-primary{% endif %} px-2 py-1">$ USD</button>

          <i class="bi bi-sun-fill" id="iconLight" style="display:none"></i>
          <i class="bi bi-moon-fill" id="iconDark"></i>

<!-- Messages -->
<div class="container-fluid px-4 pt-3">
  {% for msg in messages %}
  <div class="alert alert-{{ msg.tags|default:'info' }} alert-dismissible fade show" role="alert">
    {{ msg }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endfor %}
</div>

<!-- Main Content -->
<main class="container-fluid px-4 py-3">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function() {
  function updateIcon(t) {
    var il = document.getElementById('iconLight');
    var id = document.getElementById('iconDark');
    var lb = document.getElementById('themeLabel');
    if (!il) return;
    if (t === 'dark') {
      il.style.display = 'none'; id.style.display = '';
      if (lb) lb.textContent = 'Dark';
    } else {
      il.style.display = ''; id.style.display = 'none';
      if (lb) lb.textContent = 'Light';
    }
  }
  window.toggleTheme = function() {
    var cur = document.documentElement.getAttribute('data-bs-theme') || 'dark';
    var next = cur === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-bs-theme', next);
    localStorage.setItem('pos-theme', next);
    updateIcon(next);
    if (window.onThemeChange) window.onThemeChange(next);
  };
  updateIcon(document.documentElement.getAttribute('data-bs-theme') || 'dark');
})();
</script>
{% block extra_js %}{% endblock %}
</body>
