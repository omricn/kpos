name: Deploy to kpos.kramerav.com

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: kdeskregistry.azurecr.io
          username: kdeskregistry
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push image
        run: |
          TAG=$(date -u +'%Y%m%d-%H%M')
          docker build -t kdeskregistry.azurecr.io/kpos:$TAG -t kdeskregistry.azurecr.io/kpos:latest .
          docker push kdeskregistry.azurecr.io/kpos:$TAG
          docker push kdeskregistry.azurecr.io/kpos:latest
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name kpos \
            --resource-group KPOS \
            --image kdeskregistry.azurecr.io/kpos:${{ env.IMAGE_TAG }}
